name: shortvideoai
description: "短视频创作助手 — AI驱动的短视频内容工具"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Networking
  dio: ^5.7.0
  http: ^1.2.2

  # Auth & Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.3

  # Google Play Billing
  in_app_purchase: ^3.2.0

  # Device identification (replaces FingerprintJS)
  device_info_plus: ^11.1.1

  # UI / Content rendering
  flutter_markdown: ^0.7.6
  url_launcher: ^6.3.1
  share_plus: ^10.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
